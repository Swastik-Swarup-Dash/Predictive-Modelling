# Gold Forecasting Project Configuration

# API Keys (replace with your actual keys)
api:
  metalpriceapi_key: "233158b3be67b532b3a88a8d219fbf7e"  # Get from https://www.metalpriceapi.com
  kafka_bootstrap: "localhost:9092"

# Database Configuration
database:
  host: "localhost"
  port: 5432
  name: "gold_forecast"
  user: "postgres"
  password: "postgres"

# Model Configuration
models:
  # LSTM Configuration
  lstm:
    sequence_length: 60
    layers: 2
    units: 50
    dropout: 0.2
    epochs: 50
    batch_size: 32
    learning_rate: 0.001
  
  # Prophet Configuration
  prophet:
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10
    daily_seasonality: true
    weekly_seasonality: true
    yearly_seasonality: true
  
  # ARIMA Configuration
  arima:
    seasonal: true
    m: 7  # Weekly seasonality
    max_p: 5
    max_q: 5
    max_d: 2

# Training Configuration
training:
  test_size: 0.2
  random_state: 42
  n_splits: 5

# Forecast Configuration
forecast:
  horizon: 30  # days
  confidence_level: 0.95

# Monitoring Configuration
monitoring:
  drift_threshold: 0.05
  retrain_frequency: "weekly"  # daily, weekly, monthly

# Dashboard Configuration
dashboard:
  refresh_interval: 300  # seconds
  port: 8501

# API Configuration
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
